<!DOCTYPE html>
<html>
<head>
  <title>Food Delivery Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    body { margin: 0; }
    #map { height: 100vh; }
    #status {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 16px;
      font-weight: bold;
      border: 2px solid #813e15;
      color: #813e15;
    }
  </style>
</head>

<body>
<div id="status">Loading delivery route...</div>
<div id="map"></div>

<script>
  // read URL parameters
  const params = new URLSearchParams(window.location.search);
  const pickupLat = parseFloat(params.get('pickupLat'));
  const pickupLng = parseFloat(params.get('pickupLng'));
  const dropLat   = parseFloat(params.get('dropLat'));
  const dropLng   = parseFloat(params.get('dropLng'));

  // create map centered between pickup and drop
  const centerLat = (pickupLat + dropLat) / 2;
  const centerLng = (pickupLng + dropLng) / 2;

  var map = L.map('map').setView([centerLat, centerLng], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // pickup marker (green)
  var pickupMarker = L.marker([pickupLat, pickupLng], {
    icon: L.divIcon({
      className: '',
      html: '<div style="background:green; width:20px; height:20px; border-radius:50%; border:3px solid white;"></div>'
    })
  }).addTo(map).bindPopup(" Pickup Location").openPopup();

  // drop marker (red)
  var dropMarker = L.marker([dropLat, dropLng], {
    icon: L.divIcon({
      className: '',
      html: '<div style="background:red; width:20px; height:20px; border-radius:50%; border:3px solid white;"></div>'
    })
  }).addTo(map).bindPopup("Drop Location");

  // draw line between pickup and drop
  L.polyline([
    [pickupLat, pickupLng],
    [dropLat, dropLng]
  ], {color: '#813e15', weight: 3, dashArray: '10, 10'}).addTo(map);

  // update status
  document.getElementById('status').textContent = 
    '🚗 On way to pickup';

</script>
</body>
</html>
