<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Delivery Map</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
    }
    #map {
      height: 100vh;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script>
  // 🌍 Create map centered on Cairo
  var map = L.map('map').setView([30.0444, 31.2357], 13);

  // 🗺️ OpenStreetMap tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  let pickup = null;
  let drop = null;

  // 📍 Map click handler
  map.on('click', async function(e) {

    console.log("Clicked:", e.latlng);

    // PICKUP
    if (!pickup) {
      pickup = e.latlng;

      L.marker(pickup)
        .addTo(map)
        .bindPopup("Pickup 📍")
        .openPopup();

      alert("Pickup selected");
    }

    // DROP + SEND TO SERVER
    else if (!drop) {
      drop = e.latlng;

      L.marker(drop)
        .addTo(map)
        .bindPopup("Drop 📦")
        .openPopup();

      alert("Drop selected");

      console.log("Sending to backend...");

      try {
        const res = await fetch("http://localhost:3000/order", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            pickup: pickup,
            drop: drop
          })
        });

        const text = await res.text();
        console.log("Server response:", text);

      } catch (err) {
        console.error("Error sending to server:", err);
      }
    }

    else {
      alert("Already selected pickup and drop");
    }
  });

</script>

</body>
</html>
